        const chartContainer = document.getElementById('chartContainer');

        const filterButtons = document.querySelectorAll('.filter-btn');
        const counterText = document.getElementById('counter');
        const modal = document.getElementById('albumModal');
        const closeModalBtn = document.querySelector('.close-modal');

        let currentGenre = 'all';
        let searchQuery = '';

        function getStatusTemplate(status) {
            if (status === 'up') return '<span class="item-status status-up">▲</span>';
            if (status === 'down') return '<span class="item-status status-down">▼</span>';
            if (status === 'new') return '<span class="item-status status-new">NEW</span>';
            return '<span class="item-status status-steady">•</span>';
        }

        function renderChart() {
            if (!chartContainer) return;
            chartContainer.innerHTML = '';
            
            const filteredAlbums = albumData.filter(album => {
                const matchesGenre = currentGenre === 'all' || album.genre === currentGenre;
                const matchesSearch = album.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      album.artist.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesGenre && matchesSearch;
            });

            if (counterText) {
                counterText.textContent = `Показано: ${filteredAlbums.length} альбомов`;
            }

            if (filteredAlbums.length === 0) {
                chartContainer.innerHTML = '<p style="text-align:center; color:#555; padding: 40px;">Ничего не найдено...</p>';
                return;
            }

            filteredAlbums.forEach(album => {
                const item = document.createElement('div');
                item.className = 'chart-item';
                
                let rankClass = '';
                if (album.rank === 1) rankClass = 'rank-1';
                else if (album.rank === 2) rankClass = 'rank-2';
                else if (album.rank === 3) rankClass = 'rank-3';

                item.innerHTML = `
                    <span class="chart-position ${rankClass}">${album.rank}</span>
                    <img class="item-cover" src="${album.cover}" alt="${album.title}" loading="lazy" referrerpolicy="no-referrer">
                    <div class="item-info">
                        <span class="item-title">${album.title}</span>
                        <span class="item-artist">${album.artist}</span>
                    </div>
                    <span class="item-genre-tag">${album.genre}</span>
                    ${getStatusTemplate(album.status)}
                `;

                item.addEventListener('click', () => openModal(album));
                chartContainer.appendChild(item);
            });
        }

        function openModal(album) {
            if (!modal) return;
            document.getElementById('modalRank').textContent = `№${album.rank} в чарте`;
            document.getElementById('modalTitle').textContent = album.title;
            document.getElementById('modalArtist').textContent = album.artist;
            document.getElementById('modalGenre').textContent = album.genre;
            document.getElementById('modalYear').textContent = album.year;
            document.getElementById('modalWeeks').textContent = album.weeks;
            
            const modalCover = document.getElementById('modalCover');
            modalCover.style.background = 'none'; 
            modalCover.innerHTML = `<img src="${album.cover}" referrerpolicy="no-referrer" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">`;
            
            const playButton = document.querySelector('.btn-play');
            if (playButton) {
                playButton.onclick = () => {
                    window.open(album.spotify, '_blank');
                };
            }
            
            modal.classList.add('open');
        }

        function closeModal() {
            if (modal) modal.classList.remove('open');
        }

        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderChart();
            });
        }

        filterButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentGenre = e.target.getAttribute('data-genre');
                renderChart();
            });
        });

        if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
        
        window.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('DOMContentLoaded', renderChart);
    </script>
</body>
</html>
